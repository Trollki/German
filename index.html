<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Юля • Немецкий 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf7;--surface2:#fef9ee;
  --gold:#c8973a;--gold-light:#f0deb8;--gold-dark:#8a6220;
  --text:#2a1f0a;--text-soft:#7a6040;
  --green:#4a8a5a;--green-light:#d4edd8;
  --red:#c05050;--red-light:#f5dada;
  --blue:#4a78a8;--blue-light:#d8e8f5;
  --border:rgba(200,151,58,0.2);
  --shadow:0 2px 16px rgba(42,31,10,0.10);
  --shadow-md:0 4px 28px rgba(42,31,10,0.13);
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#f8f0dc,#ede0c4);padding:20px;}
.login-box{background:var(--surface);border-radius:28px;padding:48px 40px;width:min(400px,100%);box-shadow:var(--shadow-md);text-align:center;}
.login-icon{font-size:52px;display:block;margin-bottom:10px;}
.login-box h1{font-family:'Lora',serif;font-size:1.9rem;color:var(--gold-dark);margin-bottom:6px;}
.login-box p{color:var(--text-soft);font-size:1rem;margin-bottom:30px;}
.field{margin-bottom:16px;text-align:left;}
.field label{display:block;font-weight:700;font-size:0.85rem;color:var(--text-soft);margin-bottom:7px;}
.field input{width:100%;padding:14px 16px;border:2px solid var(--gold-light);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:1rem;color:var(--text);background:var(--surface2);outline:none;}
.field input:focus{border-color:var(--gold);}
.btn-enter{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:white;border:none;border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-enter:hover{transform:translateY(-2px);}
.login-err{color:var(--red);font-size:0.9rem;margin-top:12px;min-height:20px;font-weight:600;}

#app{display:none;}
.topbar{background:var(--surface);border-bottom:2px solid var(--gold-light);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
.topbar-brand{font-family:'Lora',serif;font-size:1.15rem;color:var(--gold-dark);font-style:italic;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-badge{padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;}
.sync-ok{background:#d4edd8;color:var(--green);}
.greeting-badge{background:var(--gold-light);color:var(--gold-dark);padding:6px 14px;border-radius:20px;font-weight:700;font-size:0.9rem;}
.btn-logout{background:var(--red-light);color:var(--red);border:none;padding:8px 14px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;}
.btn-logout:hover{background:#f0cccc;}

.nav{background:var(--surface);border-bottom:2px solid var(--gold-light);display:flex;overflow-x:auto;padding:0 16px;scrollbar-width:none;gap:4px;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{display:flex;align-items:center;gap:7px;padding:14px 18px;background:none;border:none;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text-soft);cursor:pointer;border-bottom:3px solid transparent;}
.nav-btn.on{color:var(--gold-dark);border-bottom-color:var(--gold);}

.page{padding:24px 20px;max-width:960px;margin:0 auto;display:none;}
.page.on{display:block;animation:up 0.28s ease;}
@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.sect-title{font-family:'Lora',serif;font-size:1.4rem;color:var(--gold-dark);margin-bottom:18px;}
.sect-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.card{background:var(--surface);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:16px;}
.card-title{font-size:1rem;font-weight:800;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.stat-box{background:var(--surface);border-radius:var(--r);padding:18px 16px;box-shadow:var(--shadow);border-left:5px solid var(--gold);}
.stat-box.green{border-color:var(--green);}
.stat-box.red{border-color:var(--red);}
.stat-box.blue{border-color:var(--blue);}
.stat-label{font-size:0.78rem;font-weight:700;text-transform:uppercase;color:var(--text-soft);margin-bottom:6px;}
.stat-val{font-family:'Lora',serif;font-size:2rem;font-weight:700;color:var(--text);line-height:1;}
.stat-sub{font-size:0.8rem;color:var(--text-soft);margin-top:4px;}

.lesson-card{background:var(--surface2);border:1.5px solid var(--gold-light);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.lesson-time{font-family:'Lora',serif;font-size:1.05rem;font-weight:700;color:var(--gold-dark);min-width:80px;}
.lesson-name{font-weight:800;font-size:1rem;}
.lesson-note{font-size:0.82rem;color:var(--text-soft);}
.tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;margin-right:6px;}
.tag-gold{background:var(--gold-light);color:var(--gold-dark);}

.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.student-card{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--gold-light);padding:20px;box-shadow:var(--shadow);}
.stu-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.stu-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:1.25rem;color:white;font-weight:700;background:var(--gold);}
.stu-name{font-weight:800;font-size:1.05rem;}
.stu-level{display:inline-block;background:var(--gold-light);color:var(--gold-dark);padding:2px 10px;border-radius:12px;font-size:0.78rem;font-weight:700;margin-top:3px;}
.balance-row{display:flex;justify-content:space-between;align-items:baseline;margin:10px 0 4px;}
.balance-eur{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;}
.balance-lessons{font-size:0.85rem;color:var(--text-soft);}
.balance-bar{height:8px;background:var(--gold-light);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.balance-fill{height:100%;border-radius:4px;background:var(--gold);}

.btn{padding:9px 18px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-main{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:white;}
.btn-main:hover{transform:translateY(-1px);}
.btn-green{background:var(--green-light);color:var(--green);}
.btn-red{background:var(--red-light);color:var(--red);}
.btn-soft{background:var(--gold-light);color:var(--gold-dark);}
.btn-sm{padding:6px 13px;font-size:0.82rem;}

.day-group{margin-bottom:22px;}
.day-label{font-weight:800;font-size:0.85rem;text-transform:uppercase;color:var(--text-soft);margin-bottom:8px;border-left:3px solid var(--gold);padding-left:10px;}

.fin-table{width:100%;border-collapse:collapse;}
.fin-table th{text-align:left;padding:10px 14px;font-size:0.78rem;text-transform:uppercase;color:var(--text-soft);border-bottom:2px solid var(--gold-light);font-weight:700;}
.fin-table td{padding:12px 14px;border-bottom:1px solid rgba(200,151,58,0.12);}
.amount-pos{font-weight:700;color:var(--green);}
.amount-neg{font-weight:700;color:var(--red);}

.note-area{width:100%;min-height:160px;padding:16px;border:2px solid var(--gold-light);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:1rem;color:var(--text);background:var(--surface2);outline:none;resize:vertical;}
.note-area:focus{border-color:var(--gold);}

.empty{text-align:center;padding:44px 20px;color:var(--text-soft);}
.empty-icon{font-size:3rem;display:block;margin-bottom:10px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(42,31,10,0.5);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;animation:fadeIn 0.2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:24px;padding:32px;width:min(460px,100%);box-shadow:var(--shadow-md);max-height:90vh;overflow-y:auto;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-family:'Lora',serif;font-size:1.4rem;color:var(--gold-dark);margin-bottom:22px;}
.f-row{margin-bottom:14px;}
.f-row label{display:block;font-weight:700;font-size:0.85rem;color:var(--text-soft);margin-bottom:7px;}
.f-row input,.f-row select{width:100%;padding:12px 14px;border:2px solid var(--gold-light);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:0.98rem;color:var(--text);background:var(--surface2);outline:none;}
.f-row input:focus,.f-row select:focus{border-color:var(--gold);}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
#loading-screen.hidden{display:none;}
.spinner{width:40px;height:40px;border:4px solid var(--gold-light);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-weight:700;color:var(--text-soft);font-size:1rem;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;padding:13px 22px;border-radius:14px;font-size:0.95rem;font-weight:700;z-index:600;transition:transform 0.3s;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:600px){
  .topbar{padding:0 14px;}
  .greeting-badge{display:none;}
  .page{padding:16px 12px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .modal{padding:22px 16px;}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Загружаю данные... 🌿</div>
</div>

<div id="login-wrap">
  <div class="login-box">
    <span class="login-icon">🌸</span>
    <h1>Привет, Юля!</h1>
    <p>Введи пароль, чтобы войти</p>
    <div class="field">
      <label>ПАРОЛЬ</label>
      <input type="password" id="pwd" placeholder="••••••" autocomplete="current-password">
    </div>
    <button class="btn-enter" onclick="login()">Войти →</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">🌿 Юля · Немецкий</div>
    <div class="topbar-right">
      <div class="sync-badge sync-ok" id="sync-badge">☁️ Синхронизировано</div>
      <div class="greeting-badge" id="greeting"></div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn on" id="nav-home" onclick="tab('home')">🏠 Главная</button>
    <button class="nav-btn" id="nav-schedule" onclick="tab('schedule')">📅 Расписание</button>
    <button class="nav-btn" id="nav-students" onclick="tab('students')">👩‍🎓 Ученики</button>
    <button class="nav-btn" id="nav-money" onclick="tab('money')">💰 Деньги</button>
    <button class="nav-btn" id="nav-notes" onclick="tab('notes')">📝 Заметки</button>
  </div>

  <div class="page on" id="page-home">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">Сегодня</div><div class="stat-val" id="s-today">0</div><div class="stat-sub">уроков</div></div>
      <div class="stat-box green"><div class="stat-label">Учеников</div><div class="stat-val" id="s-students">0</div><div class="stat-sub">всего</div></div>
      <div class="stat-box blue"><div class="stat-label">Неделя</div><div class="stat-val" id="s-week">0</div><div class="stat-sub">уроков</div></div>
      <div class="stat-box red"><div class="stat-label">Долг</div><div class="stat-val" id="s-debt">0€</div></div>
    </div>
    <div class="card">
      <div class="card-title">⏰ Уроки сегодня</div>
      <div id="today-list"></div>
    </div>
  </div>

  <div class="page" id="page-schedule">
    <div class="sect-row">
      <div class="sect-title">📅 Расписание</div>
      <button class="btn btn-main" onclick="openModal('m-lesson')">＋ Добавить урок</button>
    </div>
    <div id="schedule-list"></div>
  </div>

  <div class="page" id="page-students">
    <div class="sect-row">
      <div class="sect-title">👩‍🎓 Ученики</div>
      <button class="btn btn-main" onclick="openModal('m-student')">＋ Новый ученик</button>
    </div>
    <div class="student-grid" id="student-grid"></div>
  </div>

  <div class="page" id="page-money">
    <div class="sect-title">💰 Финансы</div>
    <div class="stats-row">
      <div class="stat-box green"><div class="stat-label">Получено</div><div class="stat-val" id="m-total">0€</div></div>
      <div class="stat-box red"><div class="stat-label">Долг</div><div class="stat-val" id="m-debt">0€</div></div>
    </div>
    <div class="card">
      <div class="card-title">📋 История</div>
      <div style="overflow-x:auto;">
        <table class="fin-table">
          <thead><tr><th>Дата</th><th>Ученик</th><th>Сумма</th></tr></thead>
          <tbody id="fin-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="page" id="page-notes">
    <div class="sect-title">📝 Заметки</div>
    <div class="card">
      <textarea class="note-area" id="notes-ta" placeholder="Записывай всё..."></textarea>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:12px;">
        <button class="btn btn-soft" onclick="saveNotes()">💾 Сохранить</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="m-lesson">
  <div class="modal">
    <h2>➕ Новый урок</h2>
    <div class="f-row">
      <label>Дата</label>
      <input type="date" id="l-date">
    </div>
    <div class="f-row">
      <label>Время</label>
      <input type="time" id="l-time">
    </div>
    <div class="f-row">
      <label>Ученик</label>
      <select id="l-student"></select>
    </div>
    <div class="f-row">
      <label>Тема</label>
      <input type="text" id="l-topic" placeholder="Тема...">
    </div>
    <div class="f-row">
      <label>Стоимость (€)</label>
      <input type="number" id="l-cost" placeholder="50" min="0" step="0.01">
    </div>
    <div class="modal-footer">
      <button class="btn btn-soft" onclick="closeModal('m-lesson')">Отмена</button>
      <button class="btn btn-main" onclick="saveLesson()">Сохранить</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-student">
  <div class="modal">
    <h2>➕ Новый ученик</h2>
    <div class="f-row">
      <label>Имя</label>
      <input type="text" id="s-name" placeholder="Имя...">
    </div>
    <div class="f-row">
      <label>Уровень</label>
      <select id="s-level">
        <option>A1</option>
        <option>A2</option>
        <option>B1</option>
        <option>B2</option>
        <option>C1</option>
      </select>
    </div>
    <div class="f-row">
      <label>Баланс (€)</label>
      <input type="number" id="s-balance" placeholder="0" min="0" step="0.01">
    </div>
    <div class="modal-footer">
      <button class="btn btn-soft" onclick="closeModal('m-student')">Отмена</button>
      <button class="btn btn-main" onclick="saveStudent()">Создать</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// FIREBASECONFIG - REPLACE THIS WITH YOUR CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let students = [];
let lessons = [];
let payments = [];

async function login() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) {
    showError('Введи пароль');
    return;
  }

  try {
    await auth.signInWithEmailAndPassword('yulia@german.de', pwd);
    initApp();
  } catch (e) {
    showError('Неверный пароль');
  }
}

async function logout() {
  if (confirm('Выйти?')) {
    await auth.signOut();
    location.reload();
  }
}

auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    setTimeout(() => initApp(), 300);
  } else {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('login-wrap').style.display = 'flex';
  }
});

async function initApp() {
  document.getElementById('greeting').textContent = '👋 ' + (new Date().getHours() < 12 ? 'Доброе утро' : 'Добрый день');
  
  db.collection('users').doc(currentUser.uid).collection('students')
    .onSnapshot(snap => {
      students = [];
      snap.forEach(doc => students.push({id: doc.id, ...doc.data()}));
      updateUI();
    });

  db.collection('users').doc(currentUser.uid).collection('lessons')
    .onSnapshot(snap => {
      lessons = [];
      snap.forEach(doc => lessons.push({id: doc.id, ...doc.data()}));
      updateUI();
    });

  db.collection('users').doc(currentUser.uid).collection('payments')
    .onSnapshot(snap => {
      payments = [];
      snap.forEach(doc => payments.push({id: doc.id, ...doc.data()}));
      updateUI();
    });

  const notesDoc = await db.collection('users').doc(currentUser.uid).collection('data').doc('notes').get();
  if (notesDoc.exists) {
    document.getElementById('notes-ta').value = notesDoc.data().content || '';
  }

  document.getElementById('loading-screen').classList.add('hidden');
  updateUI();
}

function updateUI() {
  const today = new Date().toLocaleDateString('en-CA');
  const todayLessons = lessons.filter(l => l.date === today);
  
  document.getElementById('s-today').textContent = todayLessons.length;
  document.getElementById('s-students').textContent = students.length;
  
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 7);
  const weekLessons = lessons.filter(l => {
    const d = new Date(l.date);
    return d >= weekStart && d < weekEnd;
  });
  document.getElementById('s-week').textContent = weekLessons.length;
  
  const debt = students.reduce((sum, s) => sum + Math.min(0, s.balance || 0), 0);
  document.getElementById('s-debt').textContent = Math.abs(debt).toFixed(2) + '€';
  
  let html = todayLessons.length ? '' : '<div class="empty"><div class="empty-icon">📭</div>Нет уроков</div>';
  todayLessons.sort((a, b) => a.time.localeCompare(b.time)).forEach(l => {
    const stu = students.find(s => s.id === l.studentId);
    html += `<div class="lesson-card">
      <div class="lesson-time">${l.time}</div>
      <div><div class="lesson-name">${stu?.name || '?'}</div><div class="lesson-note">${l.topic}</div></div>
      <span class="tag tag-gold">${l.cost}€</span>
    </div>`;
  });
  document.getElementById('today-list').innerHTML = html;
  
  updateSchedule();
  updateStudents();
  updateFinance();
}

function updateSchedule() {
  let html = '';
  const grouped = {};
  lessons.forEach(l => {
    if (!grouped[l.date]) grouped[l.date] = [];
    grouped[l.date].push(l);
  });
  
  Object.keys(grouped).sort().forEach(date => {
    const d = new Date(date + 'T00:00');
    const day = d.toLocaleDateString('ru-RU', {weekday: 'long', day: 'numeric', month: 'long'});
    html += `<div class="day-group"><div class="day-label">${day}</div>`;
    grouped[date].sort((a, b) => a.time.localeCompare(b.time)).forEach(l => {
      const stu = students.find(s => s.id === l.studentId);
      html += `<div class="lesson-card"><div class="lesson-time">${l.time}</div><div><div class="lesson-name">${stu?.name || '?'}</div><div class="lesson-note">${l.topic}</div></div><span class="tag tag-gold">${l.cost}€</span></div>`;
    });
    html += '</div>';
  });
  
  document.getElementById('schedule-list').innerHTML = html || '<div class="empty"><div class="empty-icon">📭</div>Нет уроков</div>';
}

function updateStudents() {
  let html = '';
  students.forEach(s => {
    html += `<div class="student-card">
      <div class="stu-head">
        <div class="stu-avatar">${s.name[0].toUpperCase()}</div>
        <div><div class="stu-name">${s.name}</div><div class="stu-level">${s.level}</div></div>
      </div>
      <div class="balance-row"><div class="balance-eur">${(s.balance || 0).toFixed(2)}€</div><div class="balance-lessons">${lessons.filter(l => l.studentId === s.id).length} уроков</div></div>
      <div class="balance-bar"><div class="balance-fill" style="width:${Math.min(100, (s.balance || 0) / 50 * 100)}%"></div></div>
      <button class="btn btn-sm btn-main" onclick="addPayment('${s.id}')">💳 Платёж</button>
    </div>`;
  });
  document.getElementById('student-grid').innerHTML = html || '<div class="empty"><div class="empty-icon">👥</div>Нет учеников</div>';
}

function updateFinance() {
  const total = payments.filter(p => p.amount > 0).reduce((sum, p) => sum + p.amount, 0);
  const debt = students.reduce((sum, s) => sum + Math.min(0, s.balance || 0), 0);
  
  document.getElementById('m-total').textContent = total.toFixed(2) + '€';
  document.getElementById('m-debt').textContent = Math.abs(debt).toFixed(2) + '€';
  
  let html = '';
  payments.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20).forEach(p => {
    const stu = students.find(s => s.id === p.studentId);
    const date = new Date(p.date).toLocaleDateString('ru-RU');
    const cls = p.amount > 0 ? 'amount-pos' : 'amount-neg';
    html += `<tr><td>${date}</td><td>${stu?.name || '?'}</td><td class="${cls}">${(p.amount > 0 ? '+' : '') + p.amount.toFixed(2)}€</td></tr>`;
  });
  document.getElementById('fin-body').innerHTML = html;
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  
  if (id === 'm-lesson') {
    const today = new Date().toLocaleDateString('en-CA');
    document.getElementById('l-date').value = today;
    document.getElementById('l-time').value = '10:00';
    
    let opts = '';
    students.forEach(s => opts += `<option value="${s.id}">${s.name}</option>`);
    document.getElementById('l-student').innerHTML = opts;
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function saveLesson() {
  const date = document.getElementById('l-date').value;
  const time = document.getElementById('l-time').value;
  const studentId = document.getElementById('l-student').value;
  const topic = document.getElementById('l-topic').value;
  const cost = parseFloat(document.getElementById('l-cost').value) || 0;
  
  if (!date || !time || !studentId || !topic || cost <= 0) {
    showError('Заполни все поля');
    return;
  }
  
  try {
    await db.collection('users').doc(currentUser.uid).collection('lessons').add({
      date, time, studentId, topic, cost, createdAt: new Date()
    });
    
    const stu = students.find(s => s.id === studentId);
    if (stu) {
      await db.collection('users').doc(currentUser.uid).collection('students').doc(studentId).update({
        balance: (stu.balance || 0) - cost
      });
    }
    
    closeModal('m-lesson');
    showToast('✅ Урок добавлен');
    document.getElementById('l-topic').value = '';
    document.getElementById('l-cost').value = '';
  } catch (e) {
    showError('Ошибка: ' + e.message);
  }
}

async function saveStudent() {
  const name = document.getElementById('s-name').value;
  const level = document.getElementById('s-level').value;
  const balance = parseFloat(document.getElementById('s-balance').value) || 0;
  
  if (!name) {
    showError('Введи имя');
    return;
  }
  
  try {
    await db.collection('users').doc(currentUser.uid).collection('students').add({
      name, level, balance, createdAt: new Date()
    });
    
    closeModal('m-student');
    showToast('✅ Ученик добавлен');
    document.getElementById('s-name').value = '';
    document.getElementById('s-balance').value = '0';
  } catch (e) {
    showError('Ошибка: ' + e.message);
  }
}

async function addPayment(studentId) {
  const amount = prompt('Размер платежа (€):');
  if (!amount) return;
  
  const num = parseFloat(amount);
  if (isNaN(num) || num <= 0) {
    showError('Введи число');
    return;
  }
  
  try {
    await db.collection('users').doc(currentUser.uid).collection('payments').add({
      studentId, amount: num, date: new Date().toLocaleDateString('en-CA'), createdAt: new Date()
    });
    
    const stu = students.find(s => s.id === studentId);
    if (stu) {
      await db.collection('users').doc(currentUser.uid).collection('students').doc(studentId).update({
        balance: (stu.balance || 0) + num
      });
    }
    
    showToast('✅ Платёж записан');
  } catch (e) {
    showError('Ошибка');
  }
}

async function saveNotes() {
  const content = document.getElementById('notes-ta').value;
  try {
    await db.collection('users').doc(currentUser.uid).collection('data').doc('notes').set({
      content, updatedAt: new Date()
    });
    showToast('💾 Сохранено');
  } catch (e) {
    showError('Ошибка');
  }
}

function tab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  
  document.getElementById('page-' + name).classList.add('on');
  document.getElementById('nav-' + name).classList.add('on');
}

function showError(msg) {
  document.getElementById('lerr').textContent = msg;
  setTimeout(() => { document.getElementById('lerr').textContent = ''; }, 3000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('pwd').addEventListener('keypress', e => {
  if (e.key === 'Enter') login();
});

setTimeout(() => {
  document.getElementById('loading-screen').classList.add('hidden');
}, 5000);
</script>
</body>
</html>
