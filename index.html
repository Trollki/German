<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Юля • Немецкий 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf7;--surface2:#fef9ee;
  --gold:#c8973a;--gold-light:#f0deb8;--gold-dark:#8a6220;
  --text:#2a1f0a;--text-soft:#7a6040;
  --green:#4a8a5a;--green-light:#d4edd8;
  --red:#c05050;--red-light:#f5dada;
  --blue:#4a78a8;--blue-light:#d8e8f5;
  --border:rgba(200,151,58,0.2);
  --shadow:0 2px 16px rgba(42,31,10,0.10);
  --shadow-md:0 4px 28px rgba(42,31,10,0.13);
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#f8f0dc,#ede0c4);padding:20px;}
.login-box{background:var(--surface);border-radius:28px;padding:48px 40px;width:min(400px,100%);box-shadow:var(--shadow-md);text-align:center;}
.login-icon{font-size:52px;display:block;margin-bottom:10px;}
.login-box h1{font-family:'Lora',serif;font-size:1.9rem;color:var(--gold-dark);margin-bottom:6px;}
.login-box p{color:var(--text-soft);font-size:1rem;margin-bottom:30px;}
.field{margin-bottom:16px;text-align:left;}
.field label{display:block;font-weight:700;font-size:0.85rem;color:var(--text-soft);margin-bottom:7px;}
.field input{width:100%;padding:14px 16px;border:2px solid var(--gold-light);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:1rem;color:var(--text);background:var(--surface2);o[...]
.field input:focus{border-color:var(--gold);}
.btn-enter{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:white;border:none;border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:1.1re[...]
.btn-enter:hover{transform:translateY(-2px);}
.login-err{color:var(--red);font-size:0.9rem;margin-top:12px;min-height:20px;font-weight:600;}

#app{display:none;}
.topbar{background:var(--surface);border-bottom:2px solid var(--gold-light);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9[...]
.topbar-brand{font-family:'Lora',serif;font-size:1.15rem;color:var(--gold-dark);font-style:italic;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-badge{padding:5px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;}
.sync-ok{background:#d4edd8;color:var(--green);}
.greeting-badge{background:var(--gold-light);color:var(--gold-dark);padding:6px 14px;border-radius:20px;font-weight:700;font-size:0.9rem;}
.btn-logout{background:var(--red-light);color:var(--red);border:none;padding:8px 14px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;}
.btn-logout:hover{background:#f0cccc;}

.nav{background:var(--surface);border-bottom:2px solid var(--gold-light);display:flex;overflow-x:auto;padding:0 16px;scrollbar-width:none;gap:4px;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{display:flex;align-items:center;gap:7px;padding:14px 18px;background:none;border:none;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text-soft);cursor:point[...]
.nav-btn.on{color:var(--gold-dark);border-bottom-color:var(--gold);}
.nav-btn:hover:not(.on){color:var(--text);background:rgba(200,151,58,0.06);}

.page{padding:24px 20px;max-width:960px;margin:0 auto;display:none;}
.page.on{display:block;animation:up 0.28s ease;}
@keyframes up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.sect-title{font-family:'Lora',serif;font-size:1.4rem;color:var(--gold-dark);margin-bottom:18px;display:flex;align-items:center;gap:9px;}
.sect-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.card{background:var(--surface);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:16px;}
.card-title{font-size:1rem;font-weight:800;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.stat-box{background:var(--surface);border-radius:var(--r);padding:18px 16px;box-shadow:var(--shadow);border-left:5px solid var(--gold);}
.stat-box.green{border-color:var(--green);}
.stat-box.red{border-color:var(--red);}
.stat-box.blue{border-color:var(--blue);}
.stat-label{font-size:0.78rem;font-weight:700;text-transform:uppercase;color:var(--text-soft);margin-bottom:6px;}
.stat-val{font-family:'Lora',serif;font-size:2rem;font-weight:700;color:var(--text);line-height:1;}
.stat-sub{font-size:0.8rem;color:var(--text-soft);margin-top:4px;}

.lesson-card{background:var(--surface2);border:1.5px solid var(--gold-light);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;[...]
.lesson-card:hover{box-shadow:var(--shadow);}
